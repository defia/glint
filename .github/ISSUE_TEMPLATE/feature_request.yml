name: Feature request
description: Suggest an improvement or new capability for Glint.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the workflow or problem first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is difficult about it today?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Glint to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workaround or another approach?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal panes
        - AI agent workflow
        - Sidebar and workspace state
        - Themes and appearance
        - Installation or updates
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, links, or examples if useful.
