name: Bug 反馈 / Bug report
description: 反馈 Glint 里不符合预期的问题 / Report something in Glint that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供能帮助复现问题的信息。
        Thanks for reporting a bug. Please include enough detail for the issue to be reproduced.

  - type: textarea
    id: summary
    attributes:
      label: 问题描述 / Description
      description: 发生了什么？如果有期望结果，也可以一起写在这里。 / What happened? You can also include the expected behavior here.
      placeholder: "比如 / Example: 打开某个工作区后 Glint 闪退 / Glint crashes after opening a workspace."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 如何复现 / Steps to reproduce
      description: 简单写一下触发问题的操作步骤。 / List the actions that trigger the problem.
      placeholder: |
        1. 打开 Glint / Open Glint
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: glint-version
    attributes:
      label: Glint 版本 / Glint version
      description: 可以填写 Glint 里显示的版本，或下载文件名里的版本号。 / Use the version shown in Glint or the release filename.
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS 版本 / macOS version
      placeholder: macOS 15.5
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: 安装或更新方式 / Install or update method
      options:
        - brew 安装 / Homebrew
        - 软件内更新 / In-app update
        - 手动下载 DMG / Downloaded DMG
        - 源码构建 / Built from source
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 截图或日志 / Screenshots or logs
      description: 可以拖入截图，或粘贴相关日志、崩溃信息。 / Drag screenshots here, or paste relevant logs and crash details.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 补充说明 / Additional context
      description: 其他你觉得有助于定位问题的信息。 / Anything else that might help diagnose the issue.
