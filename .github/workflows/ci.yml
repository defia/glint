name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Debug, ad-hoc signed)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve ghostty SHA
        id: ghostty
        run: |
          set -euo pipefail
          sha="$(git -C ghostty rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: ghostty-cache
        uses: actions/cache@v5
        with:
          path: |
            Vendor/GhosttyKit.xcframework
            Vendor/.ghosttykit-sha
          key: ghosttykit-${{ runner.os }}-${{ steps.ghostty.outputs.sha }}

      - name: Download GhosttyKit
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup-ghosttykit.sh

      - name: Build Glint
        run: |
          set -euo pipefail
          xcodebuild \
            -project Glint.xcodeproj \
            -scheme Glint \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build

          scripts/verify-ghostty-resources.sh build/Build/Products/Debug/Glint.app

      - name: Test Glint
        run: |
          set -euo pipefail
          xcodebuild \
            -project Glint.xcodeproj \
            -scheme GlintTests \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            test
